[build]
  command = "npm run build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "20"

# Proxy the registration API server-to-server so the browser makes a
# same-origin request (no CORS, no preflight). MUST come before the SPA
# catch-all below — Netlify uses the first matching rule.
[[redirects]]
  from = "/api/forms_pro_submit"
  to = "https://erp.elbrit.org/api/method/forms_pro.api.submission.submit_form_response"
  status = 200
  force = true

[[redirects]]
  from = "/api/trendo_register"
  to = "https://uat.elbrit.org/api/method/trendo_register"
  status = 200
  force = true

# Single-page app: serve index.html for any route (safe even without routing).
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
